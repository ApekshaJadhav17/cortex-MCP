<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cortex</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #0c0c10;
      color: #e2e2e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 14px 16px 13px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(124,58,237,0.4);
    }

    .logo-text {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #c4b5fd, #e879f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 10.5px;
      color: #484855;
      margin-left: auto;
      letter-spacing: 0.04em;
    }

    /* ── Page card ── */
    .page-card {
      margin: 12px 14px;
      padding: 10px 12px;
      background: #141418;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      display: flex;
      align-items: flex-start;
      gap: 9px;
    }

    .favicon-wrap {
      width: 20px; height: 20px;
      flex-shrink: 0;
      margin-top: 1px;
      border-radius: 4px;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: #1e1e26;
      font-size: 11px;
      color: #484855;
    }

    .favicon-wrap img {
      width: 16px; height: 16px;
      object-fit: contain;
    }

    .page-info { min-width: 0; flex: 1; }

    .page-title {
      font-size: 12.5px;
      font-weight: 500;
      color: #d4d4e0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
      line-height: 1.3;
    }

    .page-title.muted { color: #484855; font-style: italic; font-weight: 400; }

    .page-url {
      font-size: 11px;
      color: #56566b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Button area ── */
    .btn-area { padding: 0 14px 14px; }

    button {
      width: 100%;
      background: linear-gradient(135deg, #7c3aed, #9333ea);
      color: #fff;
      border: none;
      border-radius: 9px;
      padding: 11px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      font-family: inherit;
      letter-spacing: 0.01em;
      box-shadow: 0 2px 14px rgba(124,58,237,0.4);
    }

    button:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 4px 18px rgba(124,58,237,0.5); }
    button:active:not(:disabled) { transform: translateY(0); }
    button:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }

    button.saved     { background: linear-gradient(135deg, #16a34a, #15803d); box-shadow: 0 2px 14px rgba(22,163,74,0.35); }
    button.duplicate { background: linear-gradient(135deg, #2563eb, #1d4ed8); box-shadow: 0 2px 14px rgba(37,99,235,0.35); }
    button.error     { background: linear-gradient(135deg, #dc2626, #b91c1c); box-shadow: 0 2px 14px rgba(220,38,38,0.35); }

    .spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Status ── */
    .status {
      margin-top: 9px;
      font-size: 11.5px;
      color: #484855;
      text-align: center;
      min-height: 15px;
      line-height: 1.4;
      padding: 0 2px;
    }

    .status.ok   { color: #86efac; }
    .status.info { color: #93c5fd; }
    .status.err  { color: #fca5a5; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo-icon">🧠</div>
    <span class="logo-text">Cortex</span>
    <span class="tagline">second brain</span>
  </div>

  <div class="page-card">
    <div class="favicon-wrap" id="favicon-wrap">🌐</div>
    <div class="page-info">
      <div class="page-title muted" id="page-title">Loading…</div>
      <div class="page-url" id="url-display"></div>
    </div>
  </div>

  <div class="btn-area">
    <button id="save-btn" disabled>Save to Cortex</button>
    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
